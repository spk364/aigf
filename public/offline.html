<!doctype html>
<html lang="en">

    <title>You're offline · girlfriend.ai</title>
    <style>

        display: grid; place-items: center;
      }
      .logo svg { width: 34px; height: 34px; fill: #0b0a10; }

      p { color: #b9b2c9; line-height: 1.5; margin: 0 0 20px; font-size: 0.95rem; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: #c074ff; color: #0b0a10; font-weight: 700;
        padding: 12px 20px; border-radius: 999px; font-size: 0.95rem;
      }
